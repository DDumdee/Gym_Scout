<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register</title><link rel="stylesheet" href="style.css" /></head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand"><div class="brand-dot"><span>E</span></div><span class="brand-name">myapp</span></div>
      <h1 class="login-title">Create<span>Account</span></h1>
      <p class="login-sub">Start your fitness journey today.</p>
      <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="Simon Manek" /></div>
      <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="simonmanek@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="password" placeholder="········" /></div>
      <button class="btn-primary" onclick="handleRegister()">Create Account</button>
      <p class="footer-row">Already have an account? <a href="login.html">Log In</a></p>
    </div>
  </div>
  <script>
    async function handleRegister() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.querySelector('.btn-primary');
      if (!name || !email || !password) { btn.textContent = 'Fill in all fields'; return; }
      btn.textContent = 'Creating…'; btn.disabled = true;
      const res = await fetch('/auth/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, email, password}) });
      const data = await res.json();
      if (data.success) { location.href = 'login.html'; }
      else { btn.textContent = data.message || 'Error'; btn.disabled = false; }
    }
  </script>
</body></html>
