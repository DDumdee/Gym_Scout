<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In</title><link rel="stylesheet" href="style.css" /></head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand"><div class="brand-dot"><span>E</span></div><span class="brand-name">myapp</span></div>
      <h1 class="login-title">Welcome<span>Back</span></h1>
      <p class="login-sub">Sign in to continue your fitness journey.</p>
      <div class="field">
        <div class="field-header"><label>Email Address</label></div>
        <input type="email" id="email" placeholder="simonmanek@example.com" />
      </div>
      <div class="field">
        <div class="field-header"><label>Password</label><a class="forgot">Forgot Password?</a></div>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="········" style="padding-right:40px" />
          <button class="toggle-pw" onclick="togglePw()">👁</button>
        </div>
      </div>
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>
      <div class="divider"><div class="divider-line"></div><span class="divider-text">or sign up with</span><div class="divider-line"></div></div>
      <div class="oauth-row">
        <button class="oauth-btn">Google</button>
        <button class="oauth-btn">Apple</button>
      </div>
      <p class="footer-row">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>
  <script>
    function togglePw() {
      const i = document.getElementById('password');
      i.type = i.type === 'password' ? 'text' : 'password';
    }
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.querySelector('.btn-primary');
      if (!email || !password) { flash(btn, 'Fill in all fields', 'Sign In'); return; }
      btn.textContent = 'Signing in…'; btn.disabled = true;
      const res = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
      const data = await res.json();
      if (data.success) { location.href = 'welcome.html'; }
      else { flash(btn, data.message || 'Invalid credentials', 'Sign In'); }
    }
    function flash(btn, msg, original) {
      btn.textContent = msg; btn.style.background = '#A32D2D'; btn.disabled = false;
      setTimeout(() => { btn.textContent = original; btn.style.background = '#1D9E75'; }, 2000);
    }
  </script>
</body></html>
