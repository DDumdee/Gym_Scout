
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
  .login-wrap { min-height: 500px; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .login-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
  .brand-dot { width: 32px; height: 32px; border-radius: 8px; background: #1D9E75; display: flex; align-items: center; justify-content: center; }
  .brand-dot span { color: #fff; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .brand-name { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -0.02em; }
  .login-title { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 0.25rem; }
  .login-sub { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--color-text-secondary); margin: 0 0 2rem; }
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 6px; letter-spacing: 0.02em; text-transform: uppercase; font-size: 11px; }
  .field input { width: 100%; box-sizing: border-box; padding: 10px 14px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--color-text-primary); outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  .field-row { display: flex; justify-content: space-between; align-items: center; }
  .forgot { font-family: 'DM Sans', sans-serif; font-size: 12px; color: #1D9E75; text-decoration: none; cursor: pointer; }
  .submit-btn { width: 100%; padding: 11px; background: #1D9E75; color: #fff; border: none; border-radius: var(--border-radius-md); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 1.5rem; transition: background 0.15s, transform 0.1s; letter-spacing: 0.01em; }
  .submit-btn:hover { background: #0F6E56; }
  .submit-btn:active { transform: scale(0.98); }
  .divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; }
  .divider-line { flex: 1; height: 0.5px; background: var(--color-border-tertiary); }
  .divider-text { font-size: 12px; color: var(--color-text-tertiary); font-family: 'DM Sans', sans-serif; }
  .oauth-btn { width: 100%; padding: 10px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
  .oauth-btn:hover { background: var(--color-background-secondary); }
  .signup-row { text-align: center; margin-top: 1.5rem; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--color-text-secondary); }
  .signup-row a { color: #1D9E75; text-decoration: none; font-weight: 500; cursor: pointer; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 0.25rem; }
  .checkbox-row input[type=checkbox] { width: 15px; height: 15px; accent-color: #1D9E75; }
  .checkbox-row label { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--color-text-secondary); }
</style>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-dot"><span>E</span></div>
      <span class="brand-name">myapp</span>
    </div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to your account to continue.</p>
    <div class="field">
      <label>Email address</label>
      <input type="email" placeholder="you@example.com" id="email" autocomplete="email" />
    </div>
    <div class="field">
      <div class="field-row">
        <label style="margin:0">Password</label>
        <a class="forgot">Forgot password?</a>
      </div>
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>
      <div class="divider"><div class="divider-line"></div><span class="divider-text">or sign up with</span><div class="divider-line"></div></div>
      <div class="oauth-row">
        <button class="oauth-btn">Google</button>
        <button class="oauth-btn">Apple</button>
      </div>
      <p class="footer-row">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>
  <script>
    function togglePw() {
      const i = document.getElementById('password');
      i.type = i.type === 'password' ? 'text' : 'password';
    }
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.querySelector('.btn-primary');
      if (!email || !password) { flash(btn, 'Fill in all fields', 'Sign In'); return; }
      btn.textContent = 'Signing in…'; btn.disabled = true;
      const res = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
      const data = await res.json();
      if (data.success) { location.href = 'welcome.html'; }
      else { flash(btn, data.message || 'Invalid credentials', 'Sign In'); }
    }
    function flash(btn, msg, original) {
      btn.textContent = msg; btn.style.background = '#A32D2D'; btn.disabled = false;
      setTimeout(() => { btn.textContent = original; btn.style.background = '#1D9E75'; }, 2000);
    }
  </script>
</body></html>
